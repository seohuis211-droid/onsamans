        // 형의 index.js 로직 완벽 이식
        function parsePath(path) {
            const hasHyphen = path.includes('-');
            let region = '', keyword = '';
            
            if (hasHyphen) {
                const parts = path.split('-');
                region = parts[0];
                keyword = parts.slice(1).join('-');
            } else {
                let matched = '', maxlen = 0;
                for (const r in regionMap) {
                    if (path.startsWith(r) && r.length > maxlen) {
                        matched = r;
                        maxlen = r.length;
                    }
                }
                if (matched) {
                    region = matched;
                    keyword = path.substring(maxlen);
                } else {
                    region = path;
                    keyword = '';
                }
            }
            return { region, keyword };
        }

        function baseKeyword(keyword) {
            return keyword.endsWith('s') ? keyword.slice(0, -1) : keyword;
        }

        function init() {
            const path = window.location.pathname;
            const parts = path.split('/').filter(Boolean);
            const lastPart = parts[parts.length - 1];

            // 대문 표시 조건
            if (!lastPart || lastPart === 'onsamans' || lastPart === 'index.html') {
                document.getElementById('main-display').style.display = 'block';
            } 
            // 상세 페이지 표시 조건
            else {
                const parsed = parsePath(lastPart);
                const bKey = baseKeyword(parsed.keyword);
                
                const rKor = regionMap[parsed.region] || parsed.region;
                const kKor = keywordMap[bKey] || bKey;

                document.getElementById('seo-display').style.display = 'block';
                document.title = `${rKor} ${kKor} 프리미엄 리포트`;
                
                document.getElementById('dynamic-content').innerHTML = `

                    <div class="report-box">
                        <p><strong>📍 지역:</strong> ${rKor}</p>
                        <p><strong>🏢 업종/상호:</strong> ${kKor}</p>

        }
