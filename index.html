<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onsamans Project Center</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        h1 { color: #0366d6; text-align: center; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }
        .sub-text { text-align: center; font-weight: bold; color: #555; margin-bottom: 30px; }
        .main-btn { display: block; background: #2ea44f; color: white; text-decoration: none; text-align: center; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; font-size: 1.1em; }
        .main-btn:hover { background: #2c974b; }
        .wiki-section { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 20px; }
        .report-item { background: #fff; border: 1px solid #eee; padding: 10px; text-align: center; border-radius: 5px; text-decoration: none; color: #0366d6; font-size: 0.9em; font-weight: bold; }
        .report-item:hover { background: #f1f8ff; border-color: #0366d6; }
        footer { text-align: center; margin-top: 50px; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

    <h1>🌐 Onsamans Project Center</h1>
    <p class="sub-text">9,000개 이상의 실시간 상권 분석 리포트 통합 가이드</p>

    <a href="https://playzone.clickn.co.kr/" target="_blank" class="main-btn">🚀 Playzone 공식 본진 방문</a>
    <a href="https://korealocalguide.isweb.co.kr/" target="_blank" class="main-btn" style="background: #0366d6;">📍 Korea Local Guide 대장 사이트</a>

    <div class="wiki-section">
        <h3>📖 핵심 위키 가이드 (Wiki)</h3>
        <ul style="list-style: none; padding: 0;">
            <li>🏠 <a href="https://github.com/seohuis211-droid/onsamans/wiki" style="color:#0366d6; text-decoration:none;">Wiki Home 바로가기</a></li>
            <li>📝 <a href="#" style="color:#0366d6; text-decoration:none;">soops aslive 리포트 상세보기</a></li>
        </ul>
    </div>

    <h3>📊 전국 상권 분석 리포트 (게시판)</h3>
    <div class="report-grid">
        <script>
            // 형이 작업한 게시판(Discussions) 주소가 있다면 여기에 넣으면 편해!
            // 지금은 일단 예시 주소로 90개를 쫙 뿌려줄게.
            for(let i=1; i<=90; i++) {
                document.write(`<a href="https://github.com/seohuis211-droid/onsamans/discussions" class="report-item" target="_blank">리포트 Part ${i}</a>`);
            }
        </script>
    </div>

    <footer>
        © 2026 Onsamans Project. All rights reserved.
    </footer>

</body>
</html>
