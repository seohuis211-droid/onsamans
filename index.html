<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onsamans Project Center</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background: #000; color: #fff; line-height: 1.6; }
        .main-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .cta-button { display: inline-block; padding: 15px 40px; background: #00d4ff; color: #000; text-decoration: none; font-weight: bold; border-radius: 50px; margin-top: 20px; }
        
        /* 세부 페이지용 스타일 (로봇이 긁어갈 부분) */
        .seo-ui { display: none; padding: 40px 20px; background: #fff; color: #333; max-width: 800px; margin: 20px auto; border-radius: 20px; text-align: left; }
        .seo-ui.active { display: block; }
        .seo-content h1 { border-bottom: 2px solid #00d4ff; padding-bottom: 10px; color: #222; }
    </style>
</head>
<body>

    <div id="main-display" class="main-ui">
        <h1>Onsamans Project Center</h1>
        <p>9,000개 이상의 실시간 상권 분석 리포트를 운영 중입니다.</p>
        <a href="https://playzone.clickn.co.kr" class="cta-button">Playzone 공식 홈페이지</a>
    </div>

    <div id="seo-display" class="seo-ui">
        <div id="dynamic-content" class="seo-content"></div>
    </div>

    <script>
        // 형의 index.js 핵심 데이터 이식
        const regionMap = {"gyodae":"교대","sinnonhyeon":"신논현","yangjae":"양재","samsung":"삼성","seolleung":"선릉","nonhyeon":"논현","yeoksam":"역삼","itaewon":"이태원","gangnam":"강남","jongno":"종로","sadang":"사당","geondae":"건대","bundang":"분당","yatap":"야탑","seohyun":"서현","jeongjadong":"정자동","seongnam":"성남","sillim":"신림","jonggak":"종각","myeongdong":"명동","pangyo":"판교","sunae":"수내","migeum":"미금","jukjeon":"죽전","yeouido":"여의도","yeongdeungpo":"영등포","guro":"구로","daelim":"대림","dongjak":"동작","hapjeong":"합정","yongsan":"용산","hongdae":"홍대","sinchon":"신촌","gangseo":"강서"};
        const keywordMap = {"public":"퍼블릭","shirtsrooms":"셔츠룸","karaokes":"가라오케","noraebangs":"노래방","fullsalons":"풀싸롱","nightclubs":"나이트클럽"};

        function init() {
            const path = window.location.pathname;
            const target = path.split('/').filter(Boolean).pop(); // 마지막 주소값 가져오기

            if (target && target.includes('-')) {
                const [r, k] = target.split('-');
                if (regionMap[r] && keywordMap[k]) {
                    const rKor = regionMap[r];
                    const kKor = keywordMap[k];
                    
                    // 대문 가리고 리포트 보여주기
                    document.getElementById('main-display').style.display = 'none';
                    document.body.style.background = '#f4f4f4';
                    document.getElementById('seo-display').classList.add('active');

                    // 텍스트 생성 (index.js 로직)
                    const title = `${rKor} ${kKor} 상권 분석 리포트`;
                    document.title = title;
                    document.getElementById('dynamic-content').innerHTML = `
                        <h1>${title}</h1>
                        <p>현재 ${rKor} 지역의 ${kKor} 시장은 매우 활발한 움직임을 보이고 있습니다.</p>
                        <p>전문적인 분석 데이터에 따르면 해당 지역의 유동인구와 검색량은 매주 증가 추세입니다.</p>
                        <div style="background:#e3f2fd; padding:15px; border-radius:10px; margin:20px 0;">
                            <strong>데이터 업데이트:</strong> 2026년 3월 실시간 통계 반영됨
                        </div>
                        <p>더 자세한 정보는 Playzone 공식 홈페이지에서 확인 가능합니다.</p>
                    `;
                }
            }
        }
        window.onload = init;
    </script>
</body>
</html>
