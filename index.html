<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onsamans Project Center</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background: #000; color: #fff; line-height: 1.6; }
        .main-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; background: linear-gradient(135deg, #000 0%, #1a1a1a 100%); }
        h1 { font-size: 3rem; color: #00d4ff; text-shadow: 0 0 20px rgba(0,212,255,0.5); margin-bottom: 10px; }
        .cta-button { display: inline-block; padding: 15px 40px; background: #00d4ff; color: #000; text-decoration: none; font-weight: bold; border-radius: 50px; margin-top: 20px; transition: 0.3s; }
        
        /* 세부 리포트 스타일 (로봇 전용) */
        .seo-ui { display: none; padding: 40px 20px; background: #fff; color: #333; max-width: 800px; margin: 20px auto; border-radius: 20px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .seo-ui.active { display: block; }
        .seo-content h1 { font-size: 2rem; border-bottom: 3px solid #00d4ff; padding-bottom: 10px; color: #111; }
        .faq-section { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-top: 30px; border: 1px solid #eee; }
        .footer-link { margin-top: 30px; display: block; text-align: center; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-display" class="main-ui">
        <h1>Onsamans Project Center</h1>
        <p style="font-size: 1.2rem; opacity: 0.9;">9,000개 이상의 실시간 상권 분석 리포트 운영 중</p>
        <p style="opacity: 0.6;">압도적인 퀄리티로 모시겠습니다.</p>
        <a href="https://playzone.clickn.co.kr" class="cta-button">Playzone 공식 홈페이지</a>
    </div>

    <div id="seo-display" class="seo-ui">
        <div id="dynamic-content" class="seo-content"></div>
        <a href="https://playzone.clickn.co.kr" class="footer-link">상세 정보 더보기 (공식 홈페이지)</a>
    </div>

    <script>
        // 형의 index.js 핵심 로직 그대로 이식 ㅡㅡ+
        const regionMap = {"gyodae":"교대","sinnonhyeon":"신논현","yangjae":"양재","samsung":"삼성","seolleung":"선릉","nonhyeon":"논현","yeoksam":"역삼","itaewon":"이태원","gangnam":"강남","jongno":"종로","sadang":"사당","geondae":"건대","bundang":"분당","yatap":"야탑","seohyun":"서현","jeongjadong":"정자동","seongnam":"성남","sillim":"신림","jonggak":"종각","myeongdong":"명동","pangyo":"판교","sunae":"수내","migeum":"미금","jukjeon":"죽전","yeouido":"여의도","yeongdeungpo":"영등포","guro":"구로","daelim":"대림","dongjak":"동작","hapjeong":"합정","yongsan":"용산","hongdae":"홍대","sinchon":"신촌","gangseo":"강서"};
        const keywordMap = {"public":"퍼블릭","shirtsrooms":"셔츠룸","karaokes":"가라오케","noraebangs":"노래방","fullsalons":"풀싸롱","nightclubs":"나이트클럽"};

        function init() {
            const path = window.location.pathname;
            const target = path.split('/').filter(Boolean).pop(); // URL에서 마지막 단어 추출

            if (target && target.includes('-')) {
                const [r, k] = target.split('-');
                if (regionMap[r] && keywordMap[k]) {
                    const rKor = regionMap[r];
                    const kKor = keywordMap[k];
                    
                    // 대문 숨기고 리포트 공개
                    document.getElementById('main-display').style.display = 'none';
                    document.body.style.background = '#f0f2f5';
                    document.getElementById('seo-display').classList.add('active');

                    // 동적 텍스트 생성 (index.js 기능 재현)
                    const now = new Date();
                    const dailySeed = (now.getFullYear() * 10000) + ((now.getMonth() + 1) * 100) + now.getDate();
                    const randomVal = (seed) => Math.floor(Math.abs(Math.sin(seed) * 10000));
                    
                    const title = `${rKor} ${kKor} 상권 분석 리포트`;
                    document.title = title;

                    document.getElementById('dynamic-content').innerHTML = `
                        <h1>${title}</h1>
                        <p>현재 <strong>${rKor}</strong> 지역의 <strong>${kKor}</strong> 시장은 재방문율 ${85 + (randomVal(dailySeed) % 10)}%를 기록하며 매우 활발한 움직임을 보이고 있습니다.</p>
                        <p>본 리포트는 실시간 검색 트렌드와 현장 유동인구 데이터를 기반으로 작성되었습니다. ${rKor} 내 ${kKor} 서비스의 품질 지수는 100점 만점에 ${92 + (randomVal(dailySeed + 5) % 8)}점으로 측정되었습니다.</p>
                        <hr>
                        <div class="faq-section">
                            <h3>📌 자주 묻는 질문(FAQ)</h3>
                            <p><strong>Q. ${rKor} ${kKor} 이용 시 예약이 필수인가요?</strong><br>A. 네, 높은 수요로 인해 사전 예약 후 방문하시는 것을 권장합니다.</p>
                            <p><strong>Q. 주차 공간은 마련되어 있나요?</strong><br>A. 해당 지역 대부분의 업체는 무료 발렛 파킹 서비스를 제공하고 있습니다.</p>
                        </div>
                    `;
                }
            }
        }
        window.onload = init;
    </script>
</body>
</html>
